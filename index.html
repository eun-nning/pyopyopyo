<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>표표표3 아카이브</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- 로고 (타이틀 역할) -->
  <div class="title-wrapper">
    <a href="#">
      <img src="logo.png" class="title-logo">
    </a>
  </div>

  <!-- 검색 -->
  <input type="text" id="searchInput" placeholder="제목 또는 가수 검색">

  <!-- 정렬 -->
  <div class="controls">
    <button onclick="sortByNewest()">최신순</button>
    <button onclick="sortByOldest()">오래된순</button>
  </div>

  <!-- 태그 -->
  <div class="tags">
    <button onclick="filterByTag('노래뱅')">노래뱅</button>
    <button onclick="filterByTag('커버곡')">커버곡</button>
    <button onclick="filterByTag('노래조각')">노래조각</button>
  </div>

  <!-- 리스트 -->
  <table>
    <tbody id="songTable"></tbody>
  </table>

</div>

<!-- 하단 탭바 -->
<div class="bottom-nav">
  <button onclick="showAll()">홈</button>
  <button onclick="showFavoritesPage()">즐겨찾기</button>
</div>

<script src="script.js?v=5"></script>
</body>
</html>
